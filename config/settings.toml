# Central configuration for the disconnected PyPI mirror builder.
# This is the ONLY file you need to edit.
#   Build (connected machine):     scripts/build_mirror.sh
#   Verify before going offline:   scripts/verify_mirror.sh
#   Serve (disconnected machine):  scripts/serve_mirror.sh

[source]
# EITHER a local requirements file (takes precedence when set) ...
requirements_file = "./input/requirements.txt"
# ... OR a GitHub repo URL, blob URL, or direct raw URL to a requirements.txt.
# Examples that all work:
#   https://github.com/psf/requests
#   https://github.com/psf/requests/blob/main/requirements.txt
#   https://raw.githubusercontent.com/psf/requests/main/requirements.txt
github_url = ""
# Optional: path to requirements file inside the repo (used only for bare repo URLs).
requirements_path_in_repo = "requirements.txt"

[versions]
# How many versions of each package to mirror.
#   "window" -> the latest `window_size` versions compatible with EACH Python in
#               [targets].python_versions (default; guarantees every interpreter
#               has recent, installable versions while keeping the mirror small).
#   "none"   -> >=listed, no upper cap (every version from the listed one forward).
#   "major"  -> >=listed, <next_major  (forward, bounded to the resolved series).
#   "minor"  -> >=listed, <next_minor.
cap_level = "window"
# Used only when cap_level = "window": latest N compatible versions per Python.
window_size = 4
# Include pre-releases (alpha/beta/rc)? Usually false for a stable mirror.
include_prereleases = false

[targets]
# Wheels are downloaded only for these environments. Anything else is excluded
# to keep the mirror small. Pure-python (py3-none-any) wheels and sdists are
# always kept.
python_versions = ["3.9", "3.10", "3.11", "3.12", "3.13"]
# Platforms to KEEP. Supported: linux, windows, macos, freebsd.
platforms = ["linux", "windows"]
# CPU architectures of the DISCONNECTED hosts. Drives dependency-marker
# evaluation (platform_machine). Supported: x86_64, arm64.
architectures = ["x86_64"]

[resolve]
# Always included so the disconnected host can bootstrap pip and build sdists.
ensure_packages = ["pip", "setuptools", "wheel"]
# Fail the build if any requirement can't be resolved (typos, missing names).
# false = build anyway, but report.txt lists everything that will be missing.
strict = false

[mirror]
# Where bandersnatch writes the mirror on the CONNECTED build machine.
output_dir = "./mirror"
# bandersnatch master to sync from.
master = "https://pypi.org"
# Parallel download workers (bandersnatch caps this at 10).
workers = 4
# Keep the PyPI JSON metadata files (recommended; some clients use them).
keep_json = true

[serve]
# Used by scripts/serve_mirror.sh on the disconnected host (args can override).
mode = "static"     # "static" (zero-dependency) or "pypiserver"
port = 8080

[verify]
# scripts/verify_mirror.sh runs pip install --dry-run for every top-level
# requirement inside a container for EACH target Python, against the freshly
# built mirror -- on the CONNECTED build machine, before you ship it.
# Container runtime: "auto" (prefer podman, else docker), "podman", or "docker".
runtime = "auto"
# Image name template; {py} is replaced by each targets.python_versions entry.
image_template = "docker.io/library/python:{py}-slim"
# Parallel pip checks inside each container (speeds up the per-library sweep).
jobs = 4
# Local port used to serve the mirror to the containers during verification.
port = 8099
